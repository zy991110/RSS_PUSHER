name: RSS 推送到企业微信

on:
  schedule:
    # 每 30 分钟执行一次（GitHub Actions cron 使用 UTC 时间）
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 允许在 GitHub 网页手动触发，便于测试

jobs:
  push-rss:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行 RSS 推送脚本
        env:
          WECHAT_CORPID: ${{ secrets.WECHAT_CORPID }}
          WECHAT_AGENTID: ${{ secrets.WECHAT_AGENTID }}
          WECHAT_CORPSECRET: ${{ secrets.WECHAT_CORPSECRET }}
        run: python main.py
