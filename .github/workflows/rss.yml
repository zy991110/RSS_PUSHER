name: RSS 推送到微信

on:
  schedule:
    # 每天早上 9 点（北京时间 UTC+8），对应 UTC 凌晨 1 点
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许在 GitHub 网页手动触发，便于测试

jobs:
  push-rss:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行 RSS 推送脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python main.py
