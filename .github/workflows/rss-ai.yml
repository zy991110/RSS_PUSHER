name: AI 热点推送到微信和飞书

on:
  schedule:
    # 每 10 分钟运行一次，测试 schedule 是否生效；验证成功后改回 '0 1 * * *'
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 允许在 GitHub 网页手动触发，便于测试

jobs:
  push-rss:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行 AI 热点推送脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: PYTHONPATH=. python feeds/ai_hot.py
