name = "wecom-rss-proxy"
main = "index.js"
compatibility_date = "2025-04-01"

# 环境变量请勿写在这里，请在 Cloudflare Dashboard 配置为加密变量：
# Workers & Pages → 选择你的 Worker → Settings → Variables and Secrets
# 需要配置：
#   WECHAT_CORPID      企业 ID
#   WECHAT_CORPSECRET  应用 Secret
#   AUTH_TOKEN         自定义鉴权 token（一串随机字符串，自己生成）
